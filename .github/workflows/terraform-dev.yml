name: Terraform — Dev

on:
  push:
    branches: [main]
    paths:
      - "envs/dev/**"
      - "modules/**"
      - ".github/workflows/terraform-dev.yml"
  pull_request:
    branches: [main]
    paths:
      - "envs/dev/**"
      - "modules/**"
  workflow_dispatch:

# OIDC federation — no client secrets stored.
permissions:
  id-token: write
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: terraform-dev
  cancel-in-progress: false

env:
  TF_VERSION: "1.9.5"
  TF_WORKING_DIR: "envs/dev"
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform fmt
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive ../../

      - name: Terraform init (no backend)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: TFLint
        working-directory: ${{ env.TF_WORKING_DIR }}
        continue-on-error: true
        run: |
          tflint --init
          tflint --chdir=.

      - name: Checkov security scan
        uses: bridgecrewio/checkov-action@v12
        continue-on-error: true
        with:
          directory: ${{ env.TF_WORKING_DIR }}
          framework: terraform
          soft_fail: true
          output_format: cli

      - name: Terraform test (mock providers)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform test

  plan:
    name: Terraform Plan
    needs: validate
    # Gated on a repo variable so the plan job is skipped until Azure
    # credentials are wired up. Set ENABLE_AZURE_PLAN=true under
    # Settings → Variables → Actions to enable real planning.
    if: ${{ vars.ENABLE_AZURE_PLAN == 'true' }}
    runs-on: ubuntu-latest
    environment: dev-plan
    outputs:
      plan_has_changes: ${{ steps.plan.outputs.exitcode }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          set +e
          terraform plan -input=false -no-color -detailed-exitcode -out=tfplan
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"

      - name: Render plan summary
        if: always()
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform show -no-color tfplan > tfplan.txt || true
          {
            echo "### Terraform plan"
            echo ""
            echo '```'
            head -c 60000 tfplan.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/tfplan.txt', 'utf8').slice(0, 60000);
            const body = `### 📋 Terraform plan (\`dev\`)\n\n<details><summary>Show plan</summary>\n\n\`\`\`hcl\n${plan}\n\`\`\`\n\n</details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Upload plan artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 14

  apply:
    name: Terraform Apply
    needs: plan
    if: ${{ vars.ENABLE_AZURE_PLAN == 'true' && github.ref == 'refs/heads/main' && needs.plan.outputs.plan_has_changes == '2' }}
    runs-on: ubuntu-latest
    environment: dev-apply # requires reviewer approval — configured in repo settings
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false -auto-approve tfplan
